apiVersion: apps/v1
kind: Deployment
metadata:
  name: greensky-web
  namespace: greensky
  labels:
    app: greensky-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greensky-web
  template:
    metadata:
      labels:
        app: greensky-web
    spec:
      containers:
        - name: nextjs
          image: registry2.palmtech.com.au/greensky-web:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
