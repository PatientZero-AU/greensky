apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: greensky-ingress
  namespace: greensky
  annotations:
    cloudflare-tunnel-ingress-controller.strrl.dev/backend-protocol: http
  labels:
    app: greensky
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: greensky.electricsheep.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: greensky-web
                port:
                  number: 8080
