apiVersion: apps/v1
kind: Deployment
metadata:
  name: greensky-web
  namespace: greensky
  labels:
    app: greensky-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greensky-web
  template:
    metadata:
      labels:
        app: greensky-web
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: nextjs
          image: registry2.palmtech.com.au/greensky-web:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: nginx-config
          configMap:
            name: greensky-nginx-config
